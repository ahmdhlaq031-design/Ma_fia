<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a12">
    <title>مافيا | لعبة الاستنتاج الاجتماعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a18;
            background-image: radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.08) 0%, transparent 60%);
            color: #f1f5f9;
            min-height: 100vh;
        }
        .page { display: none; max-width: 560px; margin: 0 auto; padding: 20px; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .room-card {
            background: rgba(18, 18, 35, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .room-card:hover { background: rgba(25,25,48,0.95); transform: translateX(-5px); }
        
        button {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        
        .back-btn {
            background: rgba(255,255,255,0.05);
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .players-container { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; justify-content: center; }
        .player-badge {
            background: #1e1e2e;
            border-radius: 50px;
            padding: 8px 18px;
            border: 1px solid #334155;
        }
        .player-badge.host { border-color: #d4af37; }
        .player-badge.self { border-color: #8b5cf6; }
        .player-badge.dead { opacity: 0.5; text-decoration: line-through; }
        
        .chat-box {
            background: rgba(10,10,24,0.78);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            margin: 15px 0;
        }
        .chat-msg { padding: 6px 12px; margin: 4px 0; border-radius: 16px; max-width: 80%; }
        .chat-msg.own { background: rgba(139,92,246,0.2); align-self: flex-end; text-align: right; margin-left: auto; }
        .chat-msg.other { background: rgba(255,255,255,0.05); }
        .chat-msg.system { text-align: center; color: #94a3b8; font-size: 0.75rem; max-width: 100%; }
        
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content { background: #0f0f1a; border-radius: 32px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid #334155; }
        
        .fab {
            position: fixed; bottom: 30px; left: 30px;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            font-size: 1.8rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .role-card {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
            border: 1px solid #d4af37;
        }
        .role-emoji { font-size: 3rem; }
        .role-name { font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
        
        @media (max-width: 480px) { .page { padding: 12px; } }
    </style>
</head>
<body>

<!-- ========== صفحة الغرف (تظهر أول شي) ========== -->
<div class="page active" id="roomsPage">
    <h2 style="text-align:center;">🕵️ غرف المافيا</h2>
    <div id="roomsList" style="margin: 15px 0;"></div>
    <button id="createRoomBtn" style="width:100%;">+ إنشاء غرفة جديدة</button>
</div>

<!-- ========== صفحة اللوبي ========== -->
<div class="page" id="lobbyPage">
    <button class="back-btn" id="lobbyBackBtn">◀ رجوع للغرف</button>
    <h2 id="lobbyRoomName">الغرفة</h2>
    <div class="players-container" id="playersContainer"></div>
    <div class="chat-box" id="chatMessages"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="chatInput" placeholder="اكتب رسالة..." style="flex:1; padding:12px; border-radius:30px; background:#1e1e2e; border:1px solid #334155; color:white;">
        <button onclick="sendMessage()">إرسال</button>
    </div>
    <div id="gameActions" style="margin-top:15px;"></div>
</div>

<!-- ========== صفحة اللعبة ========== -->
<div class="page" id="gamePage">
    <button class="back-btn" onclick="leaveRoom()">◀ رجوع</button>
    <h2>🕵️ مافيا</h2>
    
    <div id="roleDisplay" class="role-card">
        <div class="role-emoji" id="roleEmoji">👤</div>
        <div class="role-name" id="roleName">...</div>
        <div id="roleDesc" style="font-size:0.8rem; color:#94a3b8;"></div>
    </div>
    
    <div id="nightResult" style="text-align:center; margin:10px 0; padding:10px; background:#1e1e2e; border-radius:12px;"></div>
    
    <div class="players-container" id="playersList"></div>
    
    <div id="gameActionsArea" style="margin-top:15px;"></div>
    
    <div id="gameStatus" style="text-align:center; margin-top:15px; color:#d4af37;"></div>
</div>

<!-- ========== نماذج الدخول ========== -->
<div class="modal" id="passwordModal"><div class="modal-content"><h3>🔒 غرفة خاصة</h3><input type="password" id="roomPasswordInput" placeholder="كلمة المرور" style="width:100%; padding:10px; margin:10px 0;"><button onclick="checkPassword()">دخول</button><button onclick="closeModal('passwordModal')">إلغاء</button></div></div>
<div class="modal" id="nameModal"><div class="modal-content"><h3>👤 اسمك</h3><input type="text" id="playerNameInput" placeholder="اسمك" style="width:100%; padding:10px; margin:10px 0;"><button onclick="confirmJoin()">دخول</button><button onclick="closeModal('nameModal')">إلغاء</button></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, onDisconnect, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBoKTdre9mwZFKlYAne5-f_mmZgPl1QfT4",
        authDomain: "gggg-d31c1.firebaseapp.com",
        databaseURL: "https://gggg-d31c1-default-rtdb.firebaseio.com",
        projectId: "gggg-d31c1",
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let state = {
        roomId: null, playerId: null, playerName: null, isHost: false,
        pendingRoomId: null, pendingIsPrivate: false, pendingPassword: null
    };
    let roomsListener = null, roomListener = null;

    function showToast(msg, isError=false) { alert((isError?'❌ ':'✅ ')+msg); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function generateId() { return Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,6); }
    function escapeHTML(str) { return str?.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
    }

    // ========== الغرف ==========
    async function loadRooms() {
        if (roomsListener) roomsListener();
        roomsListener = onValue(ref(db, 'rooms'), (snap) => {
            const allRooms = snap.val() || {};
            const filtered = Object.entries(allRooms).filter(([id, r]) => r.game === 'mafia' && r.phase === 'lobby');
            const container = document.getElementById('roomsList');
            if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:50px;color:#64748b;">📭 لا توجد غرف<br>اضغط + لإنشاء غرفة</div>'; return; }
            container.innerHTML = filtered.map(([id, r]) => {
                const playerCount = Object.keys(r.players || {}).length;
                const max = r.maxPlayers || 16;
                return `<div class="room-card" data-id="${id}" data-private="${r.isPrivate}" data-password="${r.password||''}"><div><b>${r.isPrivate?'🔒':'🌐'} ${escapeHTML(r.name)}</b><br><small>${escapeHTML(r.hostName)}</small></div><div>${playerCount}/${max}</div></div>`;
            }).join('');
            document.querySelectorAll('.room-card').forEach(card => {
                card.onclick = () => selectRoom(card.dataset.id, card.dataset.private === 'true', card.dataset.password);
            });
        });
    }

    function selectRoom(roomId, isPrivate, password) {
        state.pendingRoomId = roomId; state.pendingIsPrivate = isPrivate; state.pendingPassword = password;
        if (isPrivate) { document.getElementById('passwordModal').classList.add('active'); }
        else { document.getElementById('nameModal').classList.add('active'); }
    }
    
    window.checkPassword = function() {
        let pwd = document.getElementById('roomPasswordInput').value;
        if (pwd !== state.pendingPassword) { showToast('كلمة مرور خاطئة', true); return; }
        closeModal('passwordModal');
        document.getElementById('nameModal').classList.add('active');
    };
    
    window.confirmJoin = async function() {
        let playerName = document.getElementById('playerNameInput').value.trim();
        if (!playerName) { showToast('أدخل اسمك', true); return; }
        closeModal('nameModal');
        await joinRoom(state.pendingRoomId, playerName);
    };

    async function joinRoom(roomId, playerName) {
        const snap = await get(ref(db, 'rooms/'+roomId));
        const room = snap.val();
        if (!room || room.phase !== 'lobby') { showToast('الغرفة غير متاحة', true); return; }
        const max = room.maxPlayers || 16;
        if (Object.keys(room.players||{}).length >= max) { showToast('الغرفة ممتلئة', true); return; }
        state.roomId = roomId; state.playerName = playerName; state.playerId = generateId();
        await update(ref(db, 'rooms/'+roomId+'/players/'+state.playerId), { name: playerName, host: false, alive: true, role: null });
        onDisconnect(ref(db, 'rooms/'+roomId+'/players/'+state.playerId)).remove();
        await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:playerName+' انضم للغرفة', time:Date.now() });
        if (roomsListener) roomsListener();
        navigateTo('lobby');
        startRoomListener();
        startChatListener();
    }

    window.createRoom = async function() {
        let roomName = prompt('اسم الغرفة:');
        if (!roomName) return;
        let playerName = prompt('اسمك:');
        if (!playerName) return;
        let isPrivate = confirm('غرفة خاصة؟');
        let password = isPrivate ? prompt('كلمة المرور:') : null;
        if (isPrivate && !password) return;
        let roomId = generateId();
        let playerId = generateId();
        state.roomId = roomId; state.playerName = playerName; state.isHost = true; state.playerId = playerId;
        await set(ref(db, 'rooms/'+roomId), {
            game: 'mafia', name: roomName, hostName: playerName, hostId: playerId,
            isPrivate: isPrivate, password: password, phase: 'lobby', createdAt: Date.now(),
            maxPlayers: 16,
            players: { [playerId]: { name: playerName, host: true, alive: true, role: null } }
        });
        onDisconnect(ref(db, 'rooms/'+roomId+'/players/'+playerId)).remove();
        await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:playerName+' أنشأ الغرفة', time:Date.now() });
        if (roomsListener) roomsListener();
        navigateTo('lobby');
        startRoomListener();
        startChatListener();
    };
    document.getElementById('createRoomBtn').onclick = createRoom;

    function startRoomListener() {
        if (roomListener) roomListener();
        roomListener = onValue(ref(db, 'rooms/'+state.roomId), (snap) => {
            const room = snap.val();
            if (!room) { leaveRoom(); return; }
            document.getElementById('lobbyRoomName').innerText = room.name;
            const players = room.players || {};
            document.getElementById('playersContainer').innerHTML = Object.keys(players).map(id => `<div class="player-badge ${players[id].host?'host':''} ${id===state.playerId?'self':''}">${escapeHTML(players[id].name)}${players[id].host?'👑':''}</div>`).join('');
            
            const minPlayers = 4;
            const canStart = state.isHost && room.phase === 'lobby' && Object.keys(players).length >= minPlayers;
            if (canStart) {
                document.getElementById('gameActions').innerHTML = '<button id="startGameBtn" style="width:100%;">🎮 ابدأ اللعبة</button>';
                document.getElementById('startGameBtn').onclick = () => startGame();
            } else if (!state.isHost && room.phase === 'lobby') {
                document.getElementById('gameActions').innerHTML = '<div style="text-align:center;color:#64748b;">⏳ في انتظار المضيف...</div>';
            }
            
            if (room.phase === 'playing') { navigateTo('game'); updateGameUI(room); }
            if (room.phase === 'finished') { setTimeout(() => leaveRoom(), 3000); }
        });
    }

    function startChatListener() {
        onValue(ref(db, 'rooms/'+state.roomId+'/chat'), (snap) => {
            const msgs = snap.val() || {};
            const container = document.getElementById('chatMessages');
            container.innerHTML = Object.entries(msgs).sort((a,b)=>a[1].time-b[1].time).map(([id,m]) => {
                if (m.type === 'system') return `<div class="chat-msg system">📢 ${escapeHTML(m.text)}</div>`;
                const isOwn = m.senderId === state.playerId;
                return `<div class="chat-msg ${isOwn?'own':'other'}">${!isOwn?`<b>${escapeHTML(m.senderName)}</b><br>`:''}${escapeHTML(m.text)}</div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        });
    }
    
    window.sendMessage = async function() {
        let text = document.getElementById('chatInput').value;
        if (!text) return;
        await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'user', senderName:state.playerName, senderId:state.playerId, text:text, time:Date.now() });
        document.getElementById('chatInput').value = '';
    };

    async function startGame() {
        if (!state.isHost) return;
        await startMafiaGame();
    }

    // ==================== لعبة المافيا ====================
    async function startMafiaGame() {
        const snap = await get(ref(db, 'rooms/'+state.roomId));
        const room = snap.val();
        let playerIds = Object.keys(room.players);
        let count = playerIds.length;
        
        // توزيع الأدوار حسب عدد اللاعبين
        let mafia = Math.min(4, Math.max(1, Math.floor(count/3)));
        let police = Math.min(2, Math.floor(count/5)+1);
        let doctor = Math.min(2, Math.floor(count/6)+1);
        let citizen = count - mafia - police - doctor;
        if(citizen < 1){ citizen=1; if(doctor>1) doctor--; else if(police>1) police--; else mafia--; }
        
        let roles = [];
        for(let i=0; i<mafia; i++) roles.push('mafia');
        for(let i=0; i<police; i++) roles.push('police');
        for(let i=0; i<doctor; i++) roles.push('doctor');
        for(let i=0; i<citizen; i++) roles.push('citizen');
        
        // خلط الأدوار
        for(let i=roles.length-1; i>0; i--){ let j=Math.floor(Math.random()*(i+1)); [roles[i],roles[j]]=[roles[j],roles[i]]; }
        
        let updates = {};
        playerIds.forEach((id, i) => { updates[`rooms/${state.roomId}/players/${id}/role`] = roles[i]; });
        updates[`rooms/${state.roomId}/phase`] = 'playing';
        updates[`rooms/${state.roomId}/mafiaData`] = { 
            phase: 'night', round: 1, nightActions: {}, dayVotes: {}, 
            eliminatedTonight: null, eliminatedToday: null, lastNightSave: null 
        };
        await update(ref(db), updates);
        
        await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text: '🎮 لعبة المافيا بدأت!', time:Date.now() });
    }
    
    function updateGameUI(room) {
        if (!room?.mafiaData) return;
        const m = room.mafiaData;
        const players = room.players;
        const me = players[state.playerId];
        if (!me) return;
        
        // عرض الدور
        const roleNames = { mafia:'مافيا 🔪', police:'بوليس 👮', doctor:'طبيب 💉', citizen:'مواطن 👤' };
        const roleEmojis = { mafia:'🔪', police:'👮', doctor:'💉', citizen:'👤' };
        const roleDesc = { 
            mafia:'يمكنك قتل لاعب واحد كل ليلة', 
            police:'يمكنك كشف هوية لاعب واحد كل ليلة', 
            doctor:'يمكنك إنقاذ لاعب واحد كل ليلة', 
            citizen:'ليس لديك قدرات خاصة، لكن صوتك مهم' 
        };
        
        document.getElementById('roleEmoji').innerHTML = roleEmojis[me.role] || '👤';
        document.getElementById('roleName').innerHTML = roleNames[me.role] || me.role;
        document.getElementById('roleDesc').innerHTML = roleDesc[me.role] || '';
        
        // عرض اللاعبين
        const alivePlayers = Object.entries(players).filter(([id, p]) => p.alive !== false && id !== state.playerId);
        document.getElementById('playersList').innerHTML = alivePlayers.map(([id, p]) => `
            <div class="player-badge ${!p.alive?'dead':''}" onclick="mafiaAction('${id}')" style="cursor:pointer">
                ${escapeHTML(p.name)} ${!p.alive?'💀':''}
            </div>
        `).join('');
        
        // مرحلة الليل
        if (m.phase === 'night' && me.alive !== false) {
            let actionMsg = '';
            if (me.role === 'mafia') actionMsg = '🌙 اختر من تقتل (اضغط على لاعب)';
            else if (me.role === 'police') actionMsg = '🌙 اختر من تفحص (اضغط على لاعب)';
            else if (me.role === 'doctor') actionMsg = '🌙 اختر من تنقذ (اضغط على لاعب)';
            else actionMsg = '🌙 أنت مواطن... نم جيداً';
            document.getElementById('gameActionsArea').innerHTML = `<div style="text-align:center; padding:15px; background:#1e1e2e; border-radius:12px;">${actionMsg}</div>`;
            document.getElementById('gameStatus').innerHTML = `الطور: 🌙 ليل | الجولة: ${m.round}`;
        }
        // مرحلة النهار
        else if (m.phase === 'day' && me.alive !== false) {
            document.getElementById('gameActionsArea').innerHTML = `
                <div style="text-align:center; padding:15px; background:#1e1e2e; border-radius:12px;">
                    ☀️ ناقش وصوت لإعدام أحد<br>
                    <button onclick="resolveVote()" style="margin-top:10px;">🗳️ إنهاء التصويت</button>
                </div>`;
            document.getElementById('gameStatus').innerHTML = `الطور: ☀️ نهار | الجولة: ${m.round}`;
        } else if (me.alive === false) {
            document.getElementById('gameActionsArea').innerHTML = `<div style="text-align:center; padding:15px; background:#1e1e2e; border-radius:12px;">💀 أنت ميت، يمكنك متابعة المحادثة</div>`;
            document.getElementById('gameStatus').innerHTML = `الطور: ${m.phase === 'night' ? '🌙 ليل' : '☀️ نهار'} | الجولة: ${m.round}`;
        }
        
        // عرض نتيجة الليل
        if (m.eliminatedTonight && m.phase === 'day') {
            const killed = players[m.eliminatedTonight];
            document.getElementById('nightResult').innerHTML = `<div style="color:#ef4444;">💀 قُتل الليلة: ${killed?.name || '???'}</div>`;
        } else if (m.phase === 'day') {
            document.getElementById('nightResult').innerHTML = `<div style="color:#10b981;">✅ لم يُقتل أحد الليلة</div>`;
        } else {
            document.getElementById('nightResult').innerHTML = '';
        }
        
        // التحقق من نهاية اللعبة
        if (room.phase === 'finished') {
            let alivePlayersAll = Object.entries(players).filter(([id,p]) => p.alive !== false);
            let aliveMafia = alivePlayersAll.filter(([id,p]) => p.role === 'mafia').length;
            let winner = aliveMafia === 0 ? '🏆 فاز المواطنون! 🏆' : '🏆 فازت المافيا! 🏆';
            document.getElementById('gameActionsArea').innerHTML = `<div style="text-align:center; padding:20px;">${winner}<br><button onclick="leaveRoom()" style="margin-top:15px;">العودة للغرف</button></div>`;
            document.getElementById('gameStatus').innerHTML = 'انتهت اللعبة';
        }
    }
    
    window.mafiaAction = async function(targetId) {
        const snap = await get(ref(db, 'rooms/'+state.roomId));
        const room = snap.val();
        const m = room.mafiaData;
        const me = room.players[state.playerId];
        
        if (m.phase === 'night' && me.alive !== false) {
            let action = '';
            if (me.role === 'mafia') action = 'mafia_kill';
            else if (me.role === 'police') action = 'police_check';
            else if (me.role === 'doctor') action = 'doctor_save';
            else { showToast('ليس لديك قدرات في الليل', true); return; }
            
            await update(ref(db, `rooms/${state.roomId}/mafiaData/nightActions/${state.playerId}`), { target: targetId, action: action });
            showToast('✅ تم تنفيذ الإجراء');
        } else if (m.phase === 'day' && me.alive !== false) {
            await update(ref(db, `rooms/${state.roomId}/mafiaData/dayVotes/${state.playerId}`), targetId);
            showToast('✅ تم التصويت على ' + (room.players[targetId]?.name || 'اللاعب'));
        }
    };
    
    window.resolveVote = async function() {
        const snap = await get(ref(db, 'rooms/'+state.roomId));
        const room = snap.val();
        const votes = room.mafiaData?.dayVotes || {};
        const players = room.players;
        
        // حساب الأصوات
        const voteCount = {};
        Object.values(votes).forEach(v => { if(v && players[v]?.alive !== false) voteCount[v] = (voteCount[v]||0)+1; });
        
        let maxVotes = 0, eliminated = null;
        Object.entries(voteCount).forEach(([id, c]) => { if(c > maxVotes){ maxVotes=c; eliminated=id; } });
        
        let updates = {};
        if (eliminated) {
            updates[`rooms/${state.roomId}/players/${eliminated}/alive`] = false;
            await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text:`⚰️ تم إعدام ${players[eliminated]?.name}`, time:Date.now() });
        }
        
        // التحقق من نهاية اللعبة
        let alivePlayers = Object.entries(players).filter(([id,p]) => p.alive !== false && id !== eliminated);
        let aliveMafia = alivePlayers.filter(([id,p]) => p.role === 'mafia').length;
        let aliveCitizens = alivePlayers.filter(([id,p]) => p.role !== 'mafia').length;
        
        if (aliveMafia === 0) {
            updates[`rooms/${state.roomId}/phase`] = 'finished';
            await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text:'🏆 فاز المواطنون! تم القضاء على جميع المافيا', time:Date.now() });
        } else if (aliveMafia >= aliveCitizens) {
            updates[`rooms/${state.roomId}/phase`] = 'finished';
            await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text:'🏆 فازت المافيا! سيطرت على القرية', time:Date.now() });
        } else {
            updates[`rooms/${state.roomId}/mafiaData/phase`] = 'night';
            updates[`rooms/${state.roomId}/mafiaData/dayVotes`] = {};
            updates[`rooms/${state.roomId}/mafiaData/nightActions`] = {};
            updates[`rooms/${state.roomId}/mafiaData/round`] = (room.mafiaData?.round || 1) + 1;
            await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text:'🌙 حل الليل... الجميع ينامون', time:Date.now() });
            
            // معالجة القتل الليلي بعد 20 ثانية
            setTimeout(async () => {
                await processNightKill(state.roomId);
            }, 20000);
        }
        
        await update(ref(db), updates);
    };
    
    async function processNightKill(roomId) {
        const snap = await get(ref(db, 'rooms/'+roomId));
        const room = snap.val();
        if (!room?.mafiaData || room.mafiaData.phase !== 'night') return;
        
        const nightActions = room.mafiaData.nightActions || {};
        const players = room.players;
        
        let killTarget = null, saveTarget = null;
        Object.values(nightActions).forEach(a => {
            if (a.action === 'mafia_kill') killTarget = a.target;
            if (a.action === 'doctor_save') saveTarget = a.target;
        });
        
        let updates = {};
        if (killTarget && killTarget !== saveTarget && players[killTarget]?.alive !== false) {
            updates[`rooms/${roomId}/players/${killTarget}/alive`] = false;
            updates[`rooms/${roomId}/mafiaData/eliminatedTonight`] = killTarget;
            await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:`💀 قُتل ${players[killTarget]?.name} أثناء الليل`, time:Date.now() });
        } else {
            updates[`rooms/${roomId}/mafiaData/eliminatedTonight`] = null;
        }
        
        // التحقق من الفوز
        let alivePlayers = Object.entries(players).filter(([id,p]) => p.alive !== false && (killTarget !== id || killTarget === saveTarget));
        let aliveMafia = alivePlayers.filter(([id,p]) => p.role === 'mafia').length;
        let aliveCitizens = alivePlayers.filter(([id,p]) => p.role !== 'mafia').length;
        
        if (aliveMafia === 0) {
            updates[`rooms/${roomId}/phase`] = 'finished';
            await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:'🏆 فاز المواطنون! تم القضاء على جميع المافيا', time:Date.now() });
        } else if (aliveMafia >= aliveCitizens) {
            updates[`rooms/${roomId}/phase`] = 'finished';
            await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:'🏆 فازت المافيا! سيطرت على القرية', time:Date.now() });
        } else {
            updates[`rooms/${roomId}/mafiaData/phase`] = 'day';
            updates[`rooms/${roomId}/mafiaData/nightActions`] = {};
            await push(ref(db, 'rooms/'+roomId+'/chat'), { type:'system', text:'☀️ حل الصباح... استيقظ الجميع للمناقشة', time:Date.now() });
        }
        
        await update(ref(db), updates);
    }

    // ========== المغادرة ==========
    window.leaveRoom = async function() {
        if(state.roomId) { 
            await push(ref(db, 'rooms/'+state.roomId+'/chat'), { type:'system', text:state.playerName+' غادر الغرفة', time:Date.now() });
            await remove(ref(db, 'rooms/'+state.roomId+'/players/'+state.playerId)).catch(()=>{}); 
        }
        if (roomListener) roomListener();
        state = { roomId: null, playerId: null, playerName: null, isHost: false, pendingRoomId: null, pendingIsPrivate: false, pendingPassword: null };
        navigateTo('rooms');
        loadRooms();
    };
    document.getElementById('lobbyBackBtn').onclick = leaveRoom;
    
    loadRooms();
</script>
</body>
</html>
