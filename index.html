<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الألعاب - نسخة مبسطة</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a18; color: white; text-align: center; padding: 20px; }
        button { background: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; margin: 10px; }
        .room { background: #1e1e2e; padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; }
        .room:hover { background: #2a2a3e; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>🎮 مركز الألعاب</h1>
        <button onclick="openGame('mafia')">🕵️ مافيا</button>
        <button onclick="openGame('tarneeb')">♠️ طرنيب</button>
        <button onclick="openGame('uno')">🎴 UNO</button>
    </div>

    <div id="rooms" style="display:none">
        <button onclick="showMenu()">◀ رجوع</button>
        <h2 id="gameTitle"></h2>
        <div id="roomsList"></div>
        <button onclick="createRoom()">+ إنشاء غرفة</button>
    </div>

    <div id="roomPanel" style="display:none">
        <button onclick="leaveRoom()">◀ خروج</button>
        <h3 id="roomName"></h3>
        <div id="playersList"></div>
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="رسالة...">
        <button onclick="sendChat()">إرسال</button>
        <button id="startGameBtn" onclick="startGame()">▶ ابدأ اللعبة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, onDisconnect, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoKTdre9mwZFKlYAne5-f_mmZgPl1QfT4",
            authDomain: "gggg-d31c1.firebaseapp.com",
            databaseURL: "https://gggg-d31c1-default-rtdb.firebaseio.com",
            projectId: "gggg-d31c1",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let state = { currentGame: null, roomId: null, playerId: null, playerName: null, isHost: false, roomsRef: null };

        window.openGame = (game) => {
            state.currentGame = game;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('rooms').style.display = 'block';
            document.getElementById('gameTitle').innerText = game === 'mafia' ? '🕵️ غرف المافيا' : (game === 'tarneeb' ? '♠️ غرف الطرنيب' : '🎴 غرف الأونو');
            loadRooms();
        };

        async function loadRooms() {
            if (state.roomsRef) state.roomsRef();
            state.roomsRef = onValue(ref(db, 'rooms'), (snap) => {
                let rooms = snap.val() || {};
                let container = document.getElementById('roomsList');
                let list = Object.keys(rooms).filter(id => rooms[id].game === state.currentGame && rooms[id].phase === 'lobby');
                if (list.length === 0) { container.innerHTML = '<p>لا توجد غرف</p>'; return; }
                container.innerHTML = list.map(id => `<div class="room" data-id="${id}" data-name="${rooms[id].name}" data-host="${rooms[id].hostName}" data-private="${rooms[id].isPrivate}" data-password="${rooms[id].password || ''}"><div><b>${rooms[id].isPrivate ? '🔒' : '🌐'} ${rooms[id].name}</b><br><small>المضيف: ${rooms[id].hostName}</small></div><div>${Object.keys(rooms[id].players || {}).length}/8</div></div>`).join('');
                document.querySelectorAll('.room').forEach(el => el.onclick = () => joinRoom(el.dataset.id, el.dataset.name, el.dataset.private === 'true', el.dataset.password));
            });
        }

        function joinRoom(roomId, roomName, isPrivate, password) {
            if (isPrivate) { let pwd = prompt('كلمة المرور:'); if (pwd !== password) { alert('كلمة مرور خاطئة'); return; } }
            let playerName = prompt('ادخل اسمك:');
            if (!playerName) return;
            joinRoomAction(roomId, playerName);
        }

        async function joinRoomAction(roomId, playerName) {
            let roomSnap = await get(ref(db, 'rooms/' + roomId));
            let room = roomSnap.val();
            if (!room || room.phase !== 'lobby') { alert('الغرفة غير متاحة'); return; }
            let playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            state.roomId = roomId; state.playerId = playerId; state.playerName = playerName; state.isHost = false;
            await update(ref(db, 'rooms/' + roomId + '/players/' + playerId), { name: playerName, host: false, alive: true });
            onDisconnect(ref(db, 'rooms/' + roomId + '/players/' + playerId)).remove();
            await push(ref(db, 'rooms/' + roomId + '/chat'), { type: 'system', text: playerName + ' انضم للغرفة', time: Date.now() });
            document.getElementById('rooms').style.display = 'none';
            document.getElementById('roomPanel').style.display = 'block';
            document.getElementById('roomName').innerText = room.name;
            listenToRoom(roomId);
        }

        window.createRoom = async () => {
            let roomName = prompt('اسم الغرفة:');
            if (!roomName) return;
            let playerName = prompt('اسمك:');
            if (!playerName) return;
            let isPrivate = confirm('غرفة خاصة؟');
            let password = isPrivate ? prompt('كلمة المرور:') : null;
            if (isPrivate && !password) return;
            let roomId = 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            let playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            state.roomId = roomId; state.playerId = playerId; state.playerName = playerName; state.isHost = true;
            await set(ref(db, 'rooms/' + roomId), {
                game: state.currentGame, name: roomName, hostName: playerName, hostId: playerId,
                isPrivate: isPrivate, password: password, phase: 'lobby', createdAt: Date.now(),
                players: { [playerId]: { name: playerName, host: true, alive: true } }
            });
            onDisconnect(ref(db, 'rooms/' + roomId + '/players/' + playerId)).remove();
            await push(ref(db, 'rooms/' + roomId + '/chat'), { type: 'system', text: playerName + ' أنشأ الغرفة', time: Date.now() });
            document.getElementById('rooms').style.display = 'none';
            document.getElementById('roomPanel').style.display = 'block';
            document.getElementById('roomName').innerText = roomName;
            listenToRoom(roomId);
        };

        let currentRoomListener = null;
        function listenToRoom(roomId) {
            if (currentRoomListener) currentRoomListener();
            currentRoomListener = onValue(ref(db, 'rooms/' + roomId), (snap) => {
                let room = snap.val();
                if (!room) { leaveRoom(); return; }
                let players = room.players || {};
                document.getElementById('playersList').innerHTML = Object.keys(players).map(id => `<div style="display:inline-block;margin:5px;padding:10px;background:#2a2a3e;border-radius:50%;">${players[id].name}${players[id].host ? '👑' : ''}</div>`).join('');
                let chatArea = document.getElementById('chatArea');
                let msgs = room.chat || {};
                chatArea.innerHTML = Object.keys(msgs).sort((a,b)=>msgs[a].time-msgs[b].time).map(k=>`<div>${msgs[k].type==='system'?'📢':''} ${msgs[k].text}</div>`).join('');
                if (room.phase !== 'lobby') document.getElementById('startGameBtn').disabled = true;
                if (room.phase === 'finished') setTimeout(()=>leaveRoom(),2000);
            });
            let chatRef = ref(db, 'rooms/' + roomId + '/chat');
            onValue(chatRef, () => {});
        }

        window.sendChat = async () => {
            let text = document.getElementById('chatInput').value;
            if (!text || !state.roomId) return;
            await push(ref(db, 'rooms/' + state.roomId + '/chat'), { type: 'user', senderName: state.playerName, senderId: state.playerId, text: text, time: Date.now() });
            document.getElementById('chatInput').value = '';
        };

        window.startGame = async () => {
            if (!state.isHost) return alert('فقط المضيف يبدأ اللعبة');
            await update(ref(db, 'rooms/' + state.roomId), { phase: 'finished', finishedAt: Date.now() });
            alert('اللعبة بدأت (نسخة تجريبية)');
        };

        window.leaveRoom = async () => {
            if (state.roomId) { await push(ref(db, 'rooms/' + state.roomId + '/chat'), { type: 'system', text: state.playerName + ' غادر', time: Date.now() }); await remove(ref(db, 'rooms/' + state.roomId + '/players/' + state.playerId)); }
            if (currentRoomListener) currentRoomListener();
            state = { currentGame: state.currentGame, roomId: null, playerId: null, playerName: null, isHost: false, roomsRef: null };
            document.getElementById('roomPanel').style.display = 'none';
            document.getElementById('rooms').style.display = 'block';
        };

        window.showMenu = () => {
            if (currentRoomListener) currentRoomListener();
            state = { currentGame: null, roomId: null, playerId: null, playerName: null, isHost: false, roomsRef: null };
            document.getElementById('rooms').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        };
    </script>
</body>
</html>
